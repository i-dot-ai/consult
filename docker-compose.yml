
services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:0.8.0-pg17-bookworm
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # pragma: allowlist secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - consult

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    expose:
      - "9100"
      - "9001"
    ports:
      - "9100:9100"
      - "9001:9001"
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command: server --address ":9100" --console-address ":9001" /data
    networks:
      - consult
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - consult

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # Include the dev dependency group; settings.local needs django-extensions.
        UV_SYNC_DEV_FLAG: ""
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - DJANGO_SETTINGS_MODULE=backend.settings.local
      - DOMAIN_NAME=localhost:3000
      - MINIO_ENDPOINT=http://minio:9100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - consult
    # command: sh -c "venv/bin/python manage.py migrate && venv/bin/python manage.py runserver 0.0.0.0:8000"

  # Frontend
  frontend:
    image: node:24.17.0-slim
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PUBLIC_BACKEND_URL=http://backend:8000
      - PUBLIC_ENVIRONMENT=local
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - consult
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  consult:
