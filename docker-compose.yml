
services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:0.8.0-pg17-bookworm
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # pragma: allowlist secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - consult

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    expose:
      - "9100"
      - "9001"
    ports:
      - "9100:9100"
      - "9001:9001"
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command: server --address ":9100" --console-address ":9001" /data
    networks:
      - consult
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - consult

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - DJANGO_SETTINGS_MODULE=backend.settings.local
      - DOMAIN_NAME=localhost:3000
      - MINIO_ENDPOINT=http://minio:9100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - consult
    # command: sh -c "venv/bin/python manage.py migrate && venv/bin/python manage.py runserver 0.0.0.0:8000"

  # Frontend
  frontend:
    image: node:24-slim
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PUBLIC_BACKEND_URL=http://backend:8000
      - PUBLIC_ENVIRONMENT=local
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - consult
    command: sh -c "npm install && npm run dev"

  localstack:
    # Pin to the major version tag to ensure the community (free) image is used.
    # localstack/localstack:latest may resolve to the Pro image if it has been
    # previously pulled, which refuses to start without a valid licence.
    # Switch to localstack/localstack-pro:latest and set LOCALSTACK_AUTH_TOKEN
    # when an Ultimate licence is available (required for AWS Batch emulation).
    image: localstack/localstack:3
    ports:
      - '127.0.0.1:4566:4566' # LocalStack Gateway
      - '127.0.0.1:4510-4559:4510-4559' # external services port range
    environment:
      - SKIP_SSL_CERT_DOWNLOAD=1
      - DEBUG=${DEBUG:-0}
      - PERSISTENCE=${PERSISTENCE:-0}
      # Scope startup to only the services we use (faster startup, less noise).
      # Add 'batch' here once an Ultimate licence is in place.
      - SERVICES=lambda,events,iam,logs
      # Lambda containers spawned by LocalStack must join the consult network
      # so they can reach redis:6379 by hostname.
      - LAMBDA_DOCKER_NETWORK=consult
    volumes:
      - '${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack'
      - '/var/run/docker.sock:/var/run/docker.sock'
      # Init scripts — run automatically when LocalStack reaches ready state
      - './localstack/init/ready.d:/etc/localstack/init/ready.d'
      # Lambda source code — read by the init script to build deployment zips
      - './lambda/import_candidate_themes/code:/etc/localstack/init/lambda/import_candidate_themes'
      - './lambda/import_response_annotations/code:/etc/localstack/init/lambda/import_response_annotations'
    healthcheck:
      test: ["CMD", "awslocal", "lambda", "list-functions", "--region", "eu-west-2"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - consult

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  consult:
