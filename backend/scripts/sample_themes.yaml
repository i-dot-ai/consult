# Sentiment distribution (percentages that sum to 100)
sentiment_distribution:
  AGREEMENT: 60
  DISAGREEMENT: 30
  UNCLEAR: 10

# Percentage of responses marked as evidence-rich
evidence_rich_percentage: 25

# Theme assignment configuration
theme_assignment:
  min_themes_per_response: 1
  max_themes_per_response: 3

# Candidate theme generation configuration
candidate_theme_counts:
  min_per_question: 3
  max_per_question: 7

# Percentage of candidate themes that become selected themes
selected_theme_percentage: 70

# Percentage of candidate themes that will have child themes
hierarchical_theme_percentage: 30
