# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/backend"
    cooldown:
      default-days: 14
    schedule:
      interval: "weekly"
    groups:
      pip-updates:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/frontend"
    cooldown:
      default-days: 14
    schedule:
      interval: "weekly"
    groups:
      npm-updates:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/e2e_tests"
    cooldown:
      default-days: 14
    schedule:
      interval: "weekly"
    groups:
      e2e-updates:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 14
    schedule:
      interval: "weekly"
    groups:
      actions-updates:
        update-types:
          - "minor"
          - "patch"
