name: Claude PR Reviewer

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
    branches: "*"

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (optional - will use current branch if not specified)'
        required: false
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  auto-review:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/head', github.event.pull_request.number) || (github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number && format('refs/pull/{0}/head', github.event.inputs.pr_number)) || github.ref }}

      - name: Run Claude Auto Review
        if: >
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'pull_request' && (
            github.event.action == 'opened' ||
            github.event.action == 'ready_for_review' ||
            github.event.action == 'synchronize'
          ))
        uses: i-dot-ai/i-dot-ai-core-github-actions/.github/actions/claude-review@main
        with:
          LLM_GATEWAY_URL: 'https://llm-gateway.i.ai.gov.uk'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # Register a new repo key here: https://github.com/i-dot-ai/core-llm-gateway/blob/main/terraform/litellm/keys.tf#L2
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
