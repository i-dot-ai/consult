name: Backend CI

on:
  workflow_dispatch:
  # Called by required-checks.yml (PR gate, after path filtering) and deploy-main
  # (no path filtering — always runs in full before a deploy).
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Copy environment file
        run: |
          cp .env.test .env

      - name: Start services with docker compose
        run: |
          docker compose up -d postgres redis minio
          docker compose exec -T postgres pg_isready -U postgres || (sleep 5 && docker compose exec -T postgres pg_isready -U postgres) || (sleep 10 && docker compose exec -T postgres pg_isready -U postgres)

      - name: install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: install dependencies
        run: uv sync --all-packages --group dev

      - name: Setup app
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run python manage.py migrate
          uv run python manage.py makemigrations --check
        working-directory: ./backend

      - name: Run app tests
        run: make test-backend

  lint:
    runs-on: ubuntu-latest
    container: python:3.12.3

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Check code formatting
        run: |
          make check-python-code
