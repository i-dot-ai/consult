name: Frontend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:
  # Called by deploy-main as a gate before deploying. When called this way the
  # path filters above do not apply, so the suite always runs in full.
  workflow_call:

env:
  NODE_VERSION: "24.14.1" # Match exact version specified in .nvmrc and frontend/Dockerfile

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check code quality and formatting with ESLint and Prettier
        run: npm run lint

      - name: Check type errors with TypeScript
        run: npm run typecheck
