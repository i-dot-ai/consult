name: Frontend CI

on:
  workflow_dispatch:
  # Called by required-checks.yml (PR gate, after path filtering) and deploy-main
  # (no path filtering — always runs in full before a deploy).
  workflow_call:

env:
  NODE_VERSION: "26.5.0" # Match exact version specified in .nvmrc and frontend/Dockerfile

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check code quality and formatting with ESLint and Prettier
        run: npm run lint

      - name: Check type errors with TypeScript
        run: npm run typecheck
