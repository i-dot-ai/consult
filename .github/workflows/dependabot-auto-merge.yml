name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7 # v2.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── Minor/patch: approve and enable auto-merge ────────────────────────
      - name: Approve PR
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL" --body "Auto-approved: all dependency bumps are minor or patch only."

      - name: Enable auto-merge
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --rebase "$PR_URL"

      # ── Major bump: label, leave for manual review, and create Linear issue ──
      - name: Create label if missing
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create "major-version-bump" --color "e11d48" --description "Contains a major version upgrade, requires manual review" || true

      - name: Label PR for manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --add-label "major-version-bump"

      - name: Create Linear issue for major bump
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          LINEAR_API_KEY: ${{ secrets.DEPENDABOT_LINEAR_KEY }}
          LINEAR_ASSIGNEE_EMAILS: ${{ secrets.LINEAR_ASSIGNEE_EMAILS }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PREVIOUS_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
        run: python3 .github/scripts/create_linear_issue.py
