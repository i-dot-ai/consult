name: pipeline smoke tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "pipeline-mapping/**"
      - "pipeline-sign-off/**"
      - "pipeline-common/**"
      - "themefinder/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pipeline-smoke.yml"
  pull_request:
    paths:
      - "backend/**"
      - "pipeline-mapping/**"
      - "pipeline-sign-off/**"
      - "pipeline-common/**"
      - "themefinder/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pipeline-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every service here embeds the themefinder workspace member + the root
        # lockfile, so building and running each one catches workspace-resolution
        # breakage (missing/editable deps, broken .pth) before deploy.
        include:
          # --help exits 0 only if all top-level imports + module-level env reads
          # in the script succeeded. The env values themselves are not used.
          - service: pipeline-mapping
            smoke_run: >-
              docker run --rm
              -e LLM_GATEWAY_URL=x
              -e LITELLM_CONSULT_OPENAI_API_KEY=x
              -e SLACK_WEBHOOK_URL=x
              pipeline-mapping:smoke --help
          - service: pipeline-sign-off
            smoke_run: >-
              docker run --rm
              -e LLM_GATEWAY_URL=x
              -e LITELLM_CONSULT_OPENAI_API_KEY=x
              -e SLACK_WEBHOOK_URL=x
              pipeline-sign-off:smoke --help
          # backend has no --help entrypoint; importing the editable themefinder
          # member from the installed venv exercises the workspace resolution and
          # the runtime .pth pointing at /src/themefinder/src.
          - service: backend
            smoke_run: >-
              docker run --rm backend:smoke
              venv/bin/python -c "import themefinder"
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -f ${{ matrix.service }}/Dockerfile -t ${{ matrix.service }}:smoke .

      - name: Smoke run
        run: ${{ matrix.smoke_run }}
