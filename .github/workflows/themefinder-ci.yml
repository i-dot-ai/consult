# themefinder is published to PyPI with `requires-python = ">=3.10,<3.13"`,
# so this matrix exists to protect that contract. The workspace itself is
# pinned to 3.12 via backend, hence the isolated `.ci-venv` below.
# When themefinder is sunset as a public package — or its floor is raised
# to 3.12 — collapse the matrix to a single job and drop the isolated venv.
name: themefinder CI

on:
  push:
    branches: [main]
    paths:
      - "themefinder/**"
      - ".github/workflows/themefinder-ci.yml"
  pull_request:
    paths:
      - "themefinder/**"
      - ".github/workflows/themefinder-ci.yml"

jobs:
  themefinder-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}

      # Install into an isolated venv to bypass the workspace, whose
      # requires-python is pinned to 3.12 by backend.
      - name: Install dependencies
        working-directory: themefinder
        run: |
          uv venv --python ${{ matrix.python-version }} .ci-venv
          uv pip install --python .ci-venv/bin/python -e ".[dev]"

      - name: Run tests with coverage
        working-directory: themefinder
        run: .ci-venv/bin/coverage run -m pytest -v -s

      - name: Coverage report
        working-directory: themefinder
        run: .ci-venv/bin/coverage report -m --fail-under=95
