name: e2e-tests

on:
  workflow_dispatch:
  # Called by required-checks.yml (PR gate) and deploy-main.
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Copy environment file
        run: |
          cp .env.test .env

      - name: Start postgres
        run: |
          docker compose up -d postgres minio
          sleep 5

      - name: Set up Node.js (for Playwright only)
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Install Playwright dependencies
        working-directory: ./e2e_tests
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e_tests/package-lock.json') }}

      - name: Install Playwright browsers (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./e2e_tests
        run: npx playwright install --with-deps chromium

      - name: run tests
        run: make test-end-to-end
        env:
          ENVIRONMENT: test
          AWS_BUCKET_NAME: i-dot-ai-test-consult-data
          MINIO_ENDPOINT: http://localhost:9100
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin

      - name: Show docker logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs backend
          echo "=== Frontend logs ==="
          docker compose logs frontend
          echo "=== Postgres logs ==="
          docker compose logs postgres

      - name: Stop docker-compose services
        run: docker compose down
        if: always()

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: e2e_tests/playwright-report/
          retention-days: 30
