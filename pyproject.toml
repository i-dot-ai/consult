# Resolver settings must live at the workspace root — uv ignores [tool.uv]
# resolver config in member pyproject.toml files. Carried over from
# backend/pyproject.toml (main) so the i-dot-ai-utilities pin is honored.
[tool.uv]
exclude-newer = "P14D"
exclude-newer-package = { "i-dot-ai-utilities" = "2026-06-04" }

[tool.uv.workspace]
members = ["backend", "themefinder", "pipeline-sign-off", "pipeline-mapping"]
